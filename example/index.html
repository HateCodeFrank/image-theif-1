<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ImageTheif - 颜色提取示例</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        padding: 40px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
      }

      .container {
        max-width: 800px;
        margin: 0 auto;
        background: white;
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      }

      h1 {
        text-align: center;
        margin-bottom: 30px;
        color: #333;
      }

      .upload-area {
        border: 2px dashed #ccc;
        border-radius: 10px;
        padding: 40px;
        text-align: center;
        margin-bottom: 30px;
        cursor: pointer;
        transition: all 0.3s;
      }

      .upload-area:hover {
        border-color: #667eea;
        background: #f8f9ff;
      }

      .upload-area input[type="file"] {
        display: none;
      }

      .upload-btn {
        display: inline-block;
        padding: 12px 30px;
        background: #667eea;
        color: white;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        transition: background 0.3s;
      }

      .upload-btn:hover {
        background: #5568d3;
      }

      #preview {
        max-width: 100%;
        max-height: 200px;
        margin: 20px auto;
        display: none;
        border-radius: 10px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      }

      #loading {
        text-align: center;
        padding: 20px;
        display: none;
        color: #667eea;
        font-size: 18px;
      }

      #colorPalette {
        display: flex;
        gap: 10px;
        margin-top: 20px;
        flex-wrap: wrap;
        width: 100%;
      }

      #wrapper {
        margin-top: 40px;
        text-align: center;
        width: 400px;
        height: 200px;
        position: relative;
      }

      .color-box {
        aspect-ratio: 1;
        border-radius: 15px;
        position: relative;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        transition: transform 0.3s;
        cursor: pointer;
      }

      .color-box:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
      }

      .color-info {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(0, 0, 0, 0.8);
        color: white;
        padding: 15px;
        font-size: 12px;
        transform: translateY(100%);
        transition: transform 0.3s;
      }

      .color-box:hover .color-info {
        transform: translateY(0);
      }

      .color-info div {
        margin: 5px 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🎨 ImageTheif</h1>

      <div class="upload-area">
        <label class="upload-btn">
          选择图片
          <input type="file" id="fileInput" accept="image/*" />
        </label>
        <p style="margin-top: 15px; color: #666">支持 JPG、PNG、WebP 等格式</p>
      </div>

      <div style="text-align: center">
        <img id="preview" alt="预览图片" />
      </div>

      <div id="loading">⏳ 正在提取颜色...</div>

      <div id="colorPalette"></div>

      <div id="wrapper"></div>
    </div>

    <script type="module" src="./example.ts"></script>
  </body>
</html>
