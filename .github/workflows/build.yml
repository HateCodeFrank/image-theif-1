name: CI Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 拉取你的最新代码
        uses: actions/checkout@v4

      - name: 2. 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 3. 安装 Node.js 20.15.0 环境
        uses: actions/setup-node@v4
        with:
          node-version: "20.15.0"
          cache: "pnpm"

      - name: 4. 安装项目依赖
        run: pnpm install

      - name: 5. 执行自动构建打包
        run: pnpm run build

      - name: 5.5. 架构师天眼：查看到底生成了啥 (Debug)
        run: ls -la && echo "--- 尝试查看 dist 目录 ---" && ls -la dist || echo "🚨 警告：根本没有生成 dist 目录！"

      # 👇👇👇 下面是全新的魔法步骤 👇👇👇
      - name: 6. 自动部署到腾讯云服务器
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "dist/" # 注意这里加了一个斜杠 /
          target: "/opt/1panel/apps/openresty/openresty/www/sites/demo-cicd/index"
          strip_components: 1
