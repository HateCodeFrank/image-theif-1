name: 🚀 Docker CI/CD 终极部署

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. 拉取你的最新代码
        uses: actions/checkout@v4

      # 👇 魔法开始了！GitHub 环境自带 Docker，直接按照你的说明书造集装箱
      - name: 2. 召唤 Docker 打造集装箱 (Build)
        run: docker build -t my-ai-agent:latest .

      - name: 3. 把集装箱打包成压缩包 (Save)
        run: docker save my-ai-agent:latest > my-ai-agent.tar

      - name: 4. 用货车运到腾讯云临时中转站 (SCP)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "my-ai-agent.tar"
          target: "/tmp" # 先放在服务器的 /tmp 临时目录下，不需要特殊权限

      - name: 5. 服务器签收并运行集装箱！(Run)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            echo "📦 开始拆开包装，加载镜像..."
            sudo docker load < /tmp/my-ai-agent.tar
            
            echo "🧹 停掉并清理旧的集装箱（如果存在的话）..."
            sudo docker rm -f ai-agent-container || true
            
            echo "🚀 运行新的集装箱！映射到 8888 端口..."
            sudo docker run -d --name ai-agent-container -p 8888:80 my-ai-agent:latest
            
            echo "🗑️ 打扫战场，删掉压缩包..."
            rm /tmp/my-ai-agent.tar
            echo "🎉 部署大功告成！"